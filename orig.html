<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette — Color Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['DM Serif Display', 'Georgia', 'serif'],
            mono: ['DM Mono', 'monospace'],
            sans: ['DM Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #f5f4f0;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
    }

    /* Grain overlay for texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .content { position: relative; z-index: 1; }

    /* Color card */
    .color-card {
      flex: 1;
      min-width: 0;
      min-height: 260px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.22s ease,
                  flex 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06);
    }

    .color-card:hover {
      transform: translateY(-6px) scale(1.015);
      box-shadow: 0 16px 40px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.08);
      flex: 1.18;
      z-index: 2;
    }

    .color-card.locked {
      outline: 3px solid rgba(255,255,255,0.6);
      outline-offset: -3px;
    }

    /* Fade-in animation for color cards */
    @keyframes cardPop {
      0%   { opacity: 0; transform: translateY(10px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-animate { animation: cardPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* Bottom info strip */
    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.28) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .color-card:hover .card-info { opacity: 1; }

    /* Always show on mobile */
    @media (max-width: 640px) {
      .card-info { opacity: 1; }
    }

    /* HEX label */
    .hex-label {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Icon button inside card */
    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.32); transform: scale(1.12); }
    .icon-btn:active { transform: scale(0.92); }
    .icon-btn svg { width: 15px; height: 15px; color: #fff; }

    /* Tooltip */
    .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: rgba(20,20,20,0.9);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      backdrop-filter: blur(4px);
    }
    .tooltip.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* Lock badge */
    .lock-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 5px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .color-card:hover .lock-badge,
    .color-card.locked .lock-badge { opacity: 1; }
    @media (max-width: 640px) { .lock-badge { opacity: 1; } }
    .lock-badge svg { width: 13px; height: 13px; color: #fff; }

    /* Generate button */
    .gen-btn {
      background: #1a1a18;
      color: #f5f4f0;
      border: none;
      border-radius: 14px;
      padding: 14px 30px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .gen-btn:hover {
      background: #2e2e2a;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .gen-btn:active { transform: translateY(0) scale(0.97); }
    .gen-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Keyboard hint */
    .kbd {
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 2px 7px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.03em;
      opacity: 0.7;
    }

    /* Palette row */
    .palette-row {
      display: flex;
      flex-direction: row;
      gap: 10px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .palette-row {
        flex-direction: column;
      }
      .color-card {
        min-height: 120px;
        border-radius: 16px;
      }
      .color-card:hover {
        transform: none;
        flex: 1;
      }
    }
  </style>
</head>
<body class="content">

  <div class="content min-h-screen px-5 py-12 flex flex-col">

    <!-- Header -->
    <header class="mb-10 flex flex-col gap-1">
      <div class="flex items-baseline gap-3">
        <h1 class="font-serif text-4xl sm:text-5xl text-stone-900 tracking-tight leading-none">Palette</h1>
        <span class="text-stone-400 font-sans text-sm font-light mt-1">color generator</span>
      </div>
      <p class="text-stone-500 text-sm font-light max-w-sm leading-relaxed mt-1">
        Generate, lock, and copy colors. Press <kbd class="bg-stone-200 rounded px-1.5 py-0.5 text-xs font-mono text-stone-600">Space</kbd> or click Generate to shuffle.
      </p>
    </header>

    <!-- Palette -->
    <div class="palette-row" id="palette"></div>

    <!-- Controls -->
    <div class="mt-8 flex items-center gap-4 flex-wrap">
      <button class="gen-btn" id="generateBtn" onclick="generatePalette()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Generate
        <span class="kbd hidden sm:inline">Space</span>
      </button>

      <button
        onclick="clearAllLocks()"
        class="text-stone-400 hover:text-stone-700 text-sm font-sans transition-colors duration-150 flex items-center gap-1.5"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
        Unlock all
      </button>
    </div>

    <!-- Footer -->
    <footer class="mt-auto pt-12 text-stone-400 text-xs font-light">
      Click a card to lock · Click copy for HEX · Space to shuffle
    </footer>

  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let palette = [];        // Array of { hex, locked }
    const PALETTE_SIZE = 5;

    // ─── Color Randomness ─────────────────────────────────────────────────────
    // Generate perceptually pleasing hues using HSL with constrained saturation/lightness
    function randomHex() {
      const h = Math.random() * 360;               // Full hue wheel
      const s = 30 + Math.random() * 55;           // 30–85%: never grey, never neon
      const l = 30 + Math.random() * 45;           // 30–75%: never too dark/light
      return hslToHex(h, s, l);
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    // Determine if text on a given hex bg should be light or dark
    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      // Perceived luminance (WCAG formula)
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return lum > 0.55 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.9)';
    }

    // ─── Generate Palette ────────────────────────────────────────────────────
    function generatePalette() {
      // On first call, create full palette; on subsequent calls, skip locked colors
      if (palette.length === 0) {
        palette = Array.from({ length: PALETTE_SIZE }, () => ({ hex: randomHex(), locked: false }));
      } else {
        palette = palette.map(c => c.locked ? c : { hex: randomHex(), locked: false });
      }
      renderPalette();
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function renderPalette() {
      const container = document.getElementById('palette');
      container.innerHTML = '';

      palette.forEach((color, i) => {
        const card = document.createElement('div');
        card.className = `color-card card-animate ${color.locked ? 'locked' : ''}`;
        card.style.cssText = `background:${color.hex}; animation-delay:${i * 0.045}s`;
        card.title = color.locked ? 'Click to unlock' : 'Click to lock';

        // Toggle lock on card click (but not on button clicks inside)
        card.addEventListener('click', () => toggleLock(i));

        // Lock badge (top-right)
        card.innerHTML = `
          <div class="lock-badge">
            ${color.locked
              ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>`
              : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>`
            }
          </div>

          <div class="card-info">
            <span class="hex-label">${color.hex.toUpperCase()}</span>
            <div style="position:relative; display:flex; align-items:center;">
              <div class="tooltip" id="tooltip-${i}">Copied!</div>
              <button class="icon-btn" title="Copy HEX" onclick="copyColor(event, '${color.hex}', ${i})">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>
              </button>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // ─── Lock / Unlock ────────────────────────────────────────────────────────
    // Locking mechanism: each palette entry has a `locked` boolean.
    // When generating, locked entries keep their current hex; only unlocked ones get new random colors.
    function toggleLock(i) {
      palette[i].locked = !palette[i].locked;
      renderPalette();
    }

    function clearAllLocks() {
      palette = palette.map(c => ({ ...c, locked: false }));
      renderPalette();
    }

    // ─── Clipboard API ────────────────────────────────────────────────────────
    // Uses the modern navigator.clipboard API (Promise-based, secure contexts only).
    // Falls back to document.execCommand for older browsers.
    function copyColor(event, hex, index) {
      event.stopPropagation(); // Don't trigger lock toggle

      const writeToClipboard = navigator.clipboard
        ? navigator.clipboard.writeText(hex)
        : Promise.resolve(legacyCopy(hex));

      writeToClipboard
        .then(() => showTooltip(index))
        .catch(() => { legacyCopy(hex); showTooltip(index); });
    }

    function legacyCopy(text) {
      const el = document.createElement('textarea');
      el.value = text;
      el.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      el.remove();
    }

    function showTooltip(index) {
      const tip = document.getElementById(`tooltip-${index}`);
      if (!tip) return;
      tip.classList.add('show');
      setTimeout(() => tip.classList.remove('show'), 1600);
    }

    // ─── Keyboard Support ─────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        generatePalette();
        // Brief press visual on button
        const btn = document.getElementById('generateBtn');
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => (btn.style.transform = ''), 120);
      }
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    generatePalette();
  </script>
</body>
</html>
